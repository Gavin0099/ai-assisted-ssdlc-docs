name: SSDLC and Governance Validation

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/governance-drift.yml"
      - ".gitmodules"
      - ".governance/**"
      - "AGENTS.base.md"
      - "AGENTS.md"
      - "PLAN.md"
      - "requirements-validation.txt"
      - "ai-governance-framework"
      - "contract.yaml"
      - "docs/**"
      - "examples/**"
      - "governance/**"
      - "schemas/**"
      - "templates/**"
      - "tests/**"
      - "tools/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/governance-drift.yml"
      - ".gitmodules"
      - ".governance/**"
      - "AGENTS.base.md"
      - "AGENTS.md"
      - "PLAN.md"
      - "requirements-validation.txt"
      - "ai-governance-framework"
      - "contract.yaml"
      - "docs/**"
      - "examples/**"
      - "governance/**"
      - "schemas/**"
      - "templates/**"
      - "tests/**"
      - "tools/**"
  workflow_dispatch:

jobs:
  governance-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install governance runtime dependencies
        run: python -m pip install "pyyaml>=6.0"

      - name: Run governance drift check
        working-directory: ai-governance-framework
        run: python -m governance_tools.governance_drift_checker --repo ..

      - name: Run external repo readiness check
        working-directory: ai-governance-framework
        run: python -m governance_tools.external_repo_readiness --repo .. --framework-root .

  ssdlc-validators:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SSDLC validation dependencies
        run: python -m pip install -r requirements-validation.txt

      - name: Run schema-aware validator regression tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Validate evidence index
        run: python tools/validate_evidence_index.py examples/feature-auth-flow/evidence-index.md

      - name: Validate review queue
        run: python tools/validate_review_queue.py examples/feature-auth-flow/review-queue.md

      - name: Validate security decision record
        run: python tools/validate_security_decision.py examples/feature-file-upload/security-decision-record.md

      - name: Validate dependency-upgrade example pack
        run: |
          python tools/validate_evidence_index.py examples/dependency-upgrade/evidence-index.md
          python tools/validate_review_queue.py examples/dependency-upgrade/review-queue.md
          python tools/validate_security_decision.py examples/dependency-upgrade/security-decision-record.md

      - name: Validate production-incident example pack
        run: |
          python tools/validate_evidence_index.py examples/production-incident/evidence-index.md
          python tools/validate_review_queue.py examples/production-incident/review-queue.md
          python tools/validate_security_decision.py examples/production-incident/security-decision-record.md

      - name: Generate due-review report
        run: python tools/generate_due_reviews.py examples

      - name: Generate aggregation-only reviewer report
        run: python tools/generate_reviewer_report.py examples/feature-file-upload --today 2026-07-17
